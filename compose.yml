x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'

services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - ./data/app/data:/app/data
      - ./data/app/db:/app/db
      - ./data/home/bun/.claude:/home/bun/.claude
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    expose:
      - '3000'
    restart: unless-stopped
    logging: *default-logging
    networks:
      - bot
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2
    pids_limit: 150
    ipc: private

  init-permissions:
    image: busybox:latest
    volumes:
      - ./data/app/data:/app/data
      - ./data/app/db:/app/db
      - ./data/home/bun/.claude:/home/bun/.claude
    entrypoint: sh -c "chown -R 1000:1000 /app/data /app/db /home/bun/.claude"
    restart: no

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - '16686:16686'
    expose:
      - '4318'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    logging: *default-logging
    restart: unless-stopped
    networks:
      - bot

networks:
  bot:
    driver: bridge
